name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

defaults:
  run:
    working-directory: content-factory

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: content-factory/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Test
        env:
          GOOGLE_SERVICE_ACCOUNT_KEY: .github/ci-dummy-key.json
          SPREADSHEET_ID: ci-dummy
          OPENROUTER_API_KEY: ci-dummy
          TELEGRAM_BOT_TOKEN: ci-dummy
          TELEGRAM_CHANNEL_ID: ci-dummy
          TELEGRAM_NOTIFY_CHAT_ID: ci-dummy
        run: npm run test:run
