# Контент-Завод: PostgreSQL, Redis и приложение.
# Запуск: docker compose up -d
# В .env задайте DATABASE_URL и REDIS_URL с хостами postgres и redis для работы внутри сети.

services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: content_factory
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  app:
    build: .
    depends_on:
      - postgres
      - redis
    env_file: .env
    environment:
      DATABASE_URL: postgresql://user:password@postgres:5432/content_factory
      REDIS_URL: redis://redis:6379
    volumes:
      - ./secrets:/app/secrets:ro
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
